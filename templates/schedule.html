    <script>
        // Day1 and Day2 images targeted
        var day1 = document.getElementById("day1");
        var day1Date = "1 March 2024";
        var day2 = document.getElementById("day2");
        var day2Date = "2 March 2024";

        // Status assign function
        function setStatusColor(index, color) {
            document.getElementsByClassName("dayrect")[index].style.fill = color;
            document.getElementsByClassName("svgtext")[index].style.fill = color != "#292929" && color != "#35599b"? "#292929":"#FFFFFF";
            var callerName = "day" + (index > 4 ? 2 : 1) + "line" + (index > 4 ? index - 4 : index+1);
            // console.log(callerName);
            for(var i = 0; i < document.getElementsByClassName(callerName).length; i++) {
                var element = document.getElementsByClassName(callerName)[i];
                var circle = document.getElementsByClassName(callerName.replace("line", "circle"))[0];
                circle.style.fill = color;
                element.style.stroke = color;
                // console.log(element);
            }
        }
        function resetStatusColor(day) {
                if(day == 1) {
                    for(var i = 0; i < 5; i++) {
                        setStatusColor(i, "#292929");
                    }
                }
                else {
                    for(var i = 5; i < 9; i++) {
                        setStatusColor(i, "#292929");
                    }
                }
            }
        function fillStatusColors(endIndex) {
            setStatusColor(endIndex, "#d7db2c");
            for(var i = endIndex-1; i >= 0; i--) {
                setStatusColor(i, "#35599b");
            }
        }
        // background loop to check for current status of schedule
        // var cd = new Date("1 March 2024, 4:30 PM");
        setInterval(function () {
            // console.log(cd);
            var cd = new Date();
            // According to provided info, the first conference will begin at March 1st, 2024 (NOTE: ALL TIME IS REFERENCED IN 24HOUR FORMAT)
            // Following if statement checks for that date
            // | Make sure it is 1| Make sure it is march| make sure it is 2024
            if (cd.getDate() == 1 && cd.getMonth() == 2 && cd.getFullYear() == 2024) {
                // Call day 2 reset function
                resetStatusColor(2);
                if(cd.getTime() < (new Date(day1Date + " 3:00 PM"))) {
                    resetStatusColor(1);
                    resetStatusColor(2);
                }
                else if (cd.getTime() >= (new Date(day1Date + " 3:00 PM")) && cd.getTime() <= (new Date(day1Date + " 3:30 PM"))) {
                    resetStatusColor(1);
                    setStatusColor(0, "#d7db2c");
                }
                else if (cd.getTime() >= (new Date(day1Date + " 3:31 PM")) && cd.getTime() <= (new Date(day1Date + " 4:30 PM"))) {
                    resetStatusColor(1)
                    fillStatusColors(1);
                }
                else if (cd.getTime() >= (new Date(day1Date + " 4:31 PM")) && cd.getTime() <= (new Date(day1Date + " 5:30 PM"))) {
                    resetStatusColor(1);
                    fillStatusColors(2);
                }
                else if (cd.getTime() >= (new Date(day1Date + " 5:31 PM")) && cd.getTime() <= (new Date(day1Date + " 6:00 PM"))) {
                    resetStatusColor(1);
                    fillStatusColors(3);
                }
                else if (cd.getTime() >= (new Date(day1Date + " 6:01 PM")) && cd.getTime() <= (new Date(day1Date + " 7:00 PM"))) {
                    resetStatusColor(1);
                    fillStatusColors(4);
                }
                
                else {
                    resetStatusColor(1);
                    setStatusColor(0, "#35599b");
                    setStatusColor(1, "#35599b");
                    setStatusColor(2, "#35599b");
                    setStatusColor(3, "#35599b");
                    setStatusColor(4, "#35599b");
                }
            }
            // March 2nd, 2024
            //      | Make sure it is 2| Make sure it is march| make sure it is 2024
            else if (cd.getDate() == 2 && cd.getMonth() == 2 && cd.getFullYear() == 2024) {
                // Make sure day1 is marked as complete
                setStatusColor(0, "#35599b");
                setStatusColor(1, "#35599b");
                setStatusColor(2, "#35599b");
                setStatusColor(3, "#35599b");
                setStatusColor(4, "#35599b");
                //  11:30AM - 1:00PM   MARCH 2
                if (cd.getTime() < (new Date(day2Date + " 9:30 AM")).getTime()) {
                    resetStatusColor(2);
                }
                else if (cd.getTime() >= (new Date(day2Date + " 9:30 AM")) && cd.getTime() <= (new Date(day2Date + " 12:00 PM"))) {
                    resetStatusColor(2);
                    fillStatusColors(5);
                }
                // 1:00PM - 1:30PM   MARCH 2
                else if (cd.getTime() >= (new Date(day2Date + " 12:01 PM")) && cd.getTime() <= (new Date(day2Date + " 1:00 PM"))) {
                    resetStatusColor(2);
                    fillStatusColors(6);
                }
                // 1:30PM - 3:00PM   MARCH 2
                else if (cd.getTime() >= (new Date(day2Date + " 1:01 PM")) && cd.getTime() <= (new Date(day2Date + " 2:30 PM"))) {
                    resetStatusColor(2);
                    fillStatusColors(7);
                }
                // 3:00PM - 3:30PM   MARCH 2
                else if (cd.getTime() >= (new Date(day2Date + " 2:31 PM")) && cd.getTime() <= (new Date(day2Date + " 3:30 PM"))) {
                    resetStatusColor(2);
                    fillStatusColors(8);
                }
                else {
                    setStatusColor(0, "#35599b");
                    setStatusColor(1, "#35599b");
                    setStatusColor(2, "#35599b");
                    setStatusColor(3, "#35599b");
                    setStatusColor(4, "#35599b");
                    setStatusColor(5, "#35599b");
                    setStatusColor(6, "#35599b");
                    setStatusColor(7, "#35599b");
                    setStatusColor(8, "#35599b");
                }
            }
            else {
                // on the occasion that neither date is met, no modification is made (day1 not complete and day2 not complete images are shown by default as set in the HTML) and current date is reported to the console
                // console.log(cd);
                // console.log("Date:", cd.getDate(), cd.getDate() == 1)
                // console.log("Month:", cd.getMonth(), cd.getMonth() == 3)
                // console.log("Year:", cd.getFullYear(), cd.getFullYear() == 2024)
            }
        }, 1000);
    </script>
